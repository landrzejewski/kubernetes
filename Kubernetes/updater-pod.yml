apiVersion: v1
kind: Pod
metadata:
  namespace: training
  name: updater-pod
spec:
  containers:
    - name: updater
      volumeMounts:
        -  name: storage
           mountPath: /storage
        -  name: config
           mountPath: /config

#      image: landrzejewski/updater:v1
#      args:
#        - "10"
      
#      image: landrzejewski/updater:v2
#      env:
#        - name: INTERVAL
#          value: "10"
      
#      image: landrzejewski/updater:v2
#      env:
#        - name: INTERVAL
#          valueFrom:
#            configMapKeyRef:
#              name: updater-config-map
#              key: INTERVAL

      image: landrzejewski/updater:v2
      envFrom:
        - configMapRef:
            name: updater-config-map

  volumes:
    - name: storage
      hostPath:
        path: /tmp/storage
    - name: config
      configMap:
        name: updater-config-map